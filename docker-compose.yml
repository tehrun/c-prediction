services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cryptopilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cryptopilot_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-cryptopilot}
    volumes: [postgres_data:/var/lib/postgresql/data]
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env.example
    volumes: [./backend:/app]
    ports: ["8000:8000"]
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 10
  worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=INFO
    env_file: .env.example
    volumes: [./backend:/app]
    depends_on:
      backend: {condition: service_healthy}
  beat:
    build: ./backend
    command: celery -A app.workers.celery_app beat --loglevel=INFO
    env_file: .env.example
    volumes: [./backend:/app]
    depends_on:
      redis: {condition: service_healthy}
  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes: [./frontend:/app, /app/node_modules]
    ports: ["5173:5173"]
    depends_on:
      backend: {condition: service_healthy}
volumes:
  postgres_data:
  redis_data:
