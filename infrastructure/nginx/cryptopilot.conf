# Optional host-level Nginx reverse proxy for TLS termination on the VPS.
# Replace cryptopilot.example.com and proxy to the frontend container port.
server {
  listen 80;
  server_name cryptopilot.example.com;

  location / {
    proxy_pass http://127.0.0.1:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
